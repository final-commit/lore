name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (Rust backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --all-features

      - name: cargo test
        run: cargo test --all-features -- --test-threads=4
        env:
          FORGE_JWT_SECRET: "ci-test-secret-32-chars-minimum!"

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  frontend:
    name: Build (Next.js frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../forge/packages/web
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/forge
          path: forge-frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: forge-frontend/packages/web/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: forge-frontend/packages/web

      - name: pnpm build
        run: pnpm build
        working-directory: forge-frontend/packages/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3334

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: forge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
