version: '3.9'

# Lore — self-hosted documentation platform
# Usage: docker compose up -d
# Docs: https://github.com/yourorg/forge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lore-backend
    restart: unless-stopped
    ports:
      - "3334:3334"
    environment:
      LORE_PORT: "3334"
      LORE_JWT_SECRET: "${LORE_JWT_SECRET:?Set LORE_JWT_SECRET in .env}"
      LORE_DB_PATH: "/data/forge.db"
      LORE_REPO_PATH: "/data/repo"
      LORE_SEARCH_INDEX_PATH: "/data/search_index"
      LORE_ATTACHMENT_PATH: "/data/attachments"
      LORE_EMOJI_PATH: "/data/emojis"
      # Optional: AI (OpenAI-compatible)
      LORE_AI_API_KEY: "${LORE_AI_API_KEY:-}"
      LORE_AI_BASE_URL: "${LORE_AI_BASE_URL:-https://api.openai.com/v1}"
      LORE_AI_MODEL: "${LORE_AI_MODEL:-gpt-4o-mini}"
      # Optional: OAuth (Google)
      LORE_OAUTH_GOOGLE_CLIENT_ID: "${LORE_OAUTH_GOOGLE_CLIENT_ID:-}"
      LORE_OAUTH_GOOGLE_CLIENT_SECRET: "${LORE_OAUTH_GOOGLE_CLIENT_SECRET:-}"
    volumes:
      - lore_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3334/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../forge/packages/web
      dockerfile: Dockerfile
      args:
        LORE_BACKEND_URL: "http://lore-backend:3334"
    container_name: lore-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      LORE_BACKEND_URL: "http://lore-backend:3334"
      NODE_ENV: "production"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  lore_data:
    driver: local
